<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Barbearia Excellence</title>
  <link rel="stylesheet" href="log.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>
<body>
  <div class="login-box">
    <form>
      <h1>Bem-vindo à Barbearia Excellence</h1>

      <div class="nav">
<input type="email" id="usuario" placeholder="Usuário" required />
        <i class="bx bxs-user"></i>
      </div>

      <div class="nav">
<input type="password" id="senha" placeholder="Senha" required />
        <i class="bx bxs-lock-alt"></i>
      </div>

      <div id="msgError" style="display: none; color: red;">
        <label><input type="checkbox" /> Lembrar senha</label>
        <a href="#">Esqueci a senha</a>
      </div>

      <button type="submit" class="Entrar">Entrar</button>

      <div class="registrar-link">
        <p>Não tenho conta <a href="#">Cadastre-se</a></p>
      </div>
    </form>
  </div>
  <script></script>
</body>
</html>
